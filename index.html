<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord Logger</title>
  <script>
    function onEvent(eventType) {
      if (eventType === 'OnPlayClick') {
        JavaScriptInterface.runScript('start();');
      } else if (eventType === 'OnPauseClick') {
        JavaScriptInterface.runScript('stop();');
      }
    }
    function onLog(message) {
      var el = document.getElementById('log');
      if (el) el.innerText = message + '\n' + el.innerText;
    }
  </script>
  <style>
    body { font-family: monospace; background: #2c2f33; color: #fff; padding: 12px; }
    h2 { color: #7289da; }
    #log { font-size: 12px; white-space: pre-wrap; max-height: 300px; overflow: auto; }
  </style>
</head>
<body>
  <h2>🤖 Discord Logger</h2>
  <p>Play ボタンで start() を呼び出し、Pause で stop() を呼び出します。</p>
  <div id="log"></div>
</body>
</html>
